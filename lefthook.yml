# Git hooks — parallel, staged-file-aware. Install: task hooks:install  (lefthook install)
# Docs: https://lefthook.dev/configuration/

min_version: 1.6.0

pre-commit:
  parallel: true
  commands:
    rust-fmt:
      priority: 1
      glob: "*.rs"
      exclude: "(^|/)target/"
      run: bash scripts/ci/run.sh fmt
      stage_fixed: true

    rust-clippy:
      priority: 2
      glob: "*.rs"
      exclude: "(^|/)target/"
      run: bash scripts/ci/run.sh clippy

    ruff:
      glob: "python/**/*.py"
      run: bash scripts/ci/run.sh ruff-staged --fix
      stage_fixed: true

    r-format:
      glob: "{comparisons/**/*.R,tests/*.R}"
      run: bash scripts/ci/run.sh r-format-staged --fix
      stage_fixed: true

    julia-format:
      glob: "comparisons/**/*.jl"
      run: bash scripts/ci/run.sh julia-format-staged --fix
      stage_fixed: true

    rust-check-manifest:
      priority: 3
      glob: "{Cargo.toml,Cargo.lock,python/Cargo.toml,python/Cargo.lock}"
      run: bash scripts/ci/run.sh check

    repo-metadata:
      glob: "{Cargo.toml,scripts/sync_github_repo_metadata.py}"
      run: bash scripts/ci/run.sh repo-metadata

    benchmarks-smoke:
      glob: "{comparisons/**,scripts/run_cross_language_benchmarks.py,.github/workflows/benchmarks.yml}"
      run: bash scripts/ci/run.sh benchmarks-smoke

pre-push:
  parallel: true
  commands:
    preflight:
      run: bash scripts/ci/run.sh preflight
