<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lme-rs Benchmark Pages</title>
  <meta http-equiv="refresh" content="0; url=./benchmarks/">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --fg: #172127;
      --muted: #5a6770;
      --accent: #0f766e;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.18), transparent 38%),
        linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
      color: var(--fg);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(40rem, calc(100vw - 3rem));
      padding: 2rem;
      border: 1px solid rgba(23, 33, 39, 0.12);
      background: rgba(255, 252, 246, 0.92);
      box-shadow: 0 20px 60px rgba(23, 33, 39, 0.08);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 0.95;
    }

    p {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.5;
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>lme-rs Benchmark Pages</h1>
    <p>Redirecting to the latest published benchmark dashboard.</p>
    <p><a href="./benchmarks/">Open the benchmark dashboard</a></p>
  </main>
</body>
</html>
