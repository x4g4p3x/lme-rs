version: '3'

vars:
  RUN: '{{if eq OS "windows"}}python{{else}}python3{{end}} scripts/ci/lme_ci.py'

tasks:
  default:
    aliases: [ci]
    desc: Full local CI (mirrors GitHub Actions core jobs)
    cmds:
      - task: ci

  ci:
    desc: Run full local CI (build, test, Python bindings, fmt, clippy, check, doctest, doc)
    cmds:
      - '{{.RUN}} ci'

  ci:fast:
    desc: CI with reused python/.venv and no isolated-wheel pytest pass
    cmds:
      - '{{.RUN}} ci --reuse-venv --skip-isolated-wheel'

  lint:
    desc: Rust fmt/clippy + Ruff on python/tests and examples
    cmds:
      - '{{.RUN}} lint'

  preflight:
    desc: Pre-push gate (lint + cargo check --all-targets + cargo audit + legal)
    cmds:
      - '{{.RUN}} preflight'

  audit:
    desc: cargo audit (root + python/) and pip-audit
    cmds:
      - '{{.RUN}} audit'

  legal:
    desc: Validate third-party notices, fixture provenance, and Rust license metadata
    cmds:
      - '{{.RUN}} legal'

  repo-metadata:
    desc: Dry-run GitHub metadata sync; verify REPO_ADMIN_TOKEN if set
    cmds:
      - '{{.RUN}} repo-metadata'

  completion:check:
    desc: Validate completion-manifest arithmetic and published score markers
    cmds:
      - '{{.RUN}} completion-check'

  benchmarks:smoke:
    desc: Release examples + sleepstudy Rust cross-language benchmark smoke
    cmds:
      - '{{.RUN}} benchmarks-smoke'

  benchmarks:preflight:
    desc: benchmarks-smoke + optional R sleepstudy.R when lme4 is installed
    cmds:
      - '{{.RUN}} benchmarks-preflight'

  benchmarks:fair-rust-julia:
    desc: Fair fit-only Rust vs Julia timing (LMM+GLMM; skip if Julia/MixedModels missing)
    cmds:
      - '{{.RUN}} benchmarks-fair-rust-julia'

  benchmarks:perf-breakdown:
    desc: Rust LME_PERF_DIAG vs Julia optsum.feval on fair fixtures
    cmds:
      - '{{.RUN}} perf-breakdown'

  lint:rust:
    desc: Rust-only lint (fmt check + clippy)
    cmds:
      - '{{.RUN}} rust-lint'

  lint:python:
    desc: Ruff check/format on python/tests and python/examples
    cmds:
      - '{{.RUN}} ruff-lint'

  lint:comparisons:
    desc: Optional format check for comparisons R/Julia (skip if tools missing)
    cmds:
      - '{{.RUN}} comparison-format-check'

  lint:comparisons:required:
    desc: Format check for comparisons R/Julia (fail if R/Julia formatters missing)
    cmds:
      - '{{.RUN}} comparison-format-check --required'

  lint:comparisons:staged:
    desc: Format staged comparisons R/Julia scripts (pre-commit)
    cmds:
      - '{{.RUN}} r-format-staged --fix'
      - '{{.RUN}} julia-format-staged --fix'

  lint:ci:
    desc: lint + cargo check (no tests, no maturin/pytest)
    cmds:
      - task: lint
      - task: check

  fmt:
    desc: Apply rustfmt to the workspace
    cmds:
      - '{{.RUN}} fmt'

  fmt:check:
    desc: Check rustfmt formatting
    cmds:
      - '{{.RUN}} fmt-check'

  clippy:
    desc: Run clippy with warnings denied
    cmds:
      - '{{.RUN}} clippy'

  check:
    desc: cargo check --workspace --all-targets --locked
    cmds:
      - '{{.RUN}} check'

  test:
    desc: Full Rust test suite (integration + unit)
    cmds:
      - '{{.RUN}} build-test'

  test:fast:
    desc: Quick unit tests only (~1s runtime after compile)
    cmds:
      - '{{.RUN}} test-fast'

  rust:
    desc: Rust-only CI slice (fmt check, clippy, check, build/test, doctest, doc)
    cmds:
      - '{{.RUN}} rust-all'

  python:
    desc: Python bindings flow (maturin develop + pytest + wheel reinstall)
    cmds:
      - '{{.RUN}} python'

  lint:python:staged:
    desc: Ruff check/format staged python/**/*.py (pre-commit)
    cmds:
      - '{{.RUN}} ruff-staged --fix'

  hooks:install:
    desc: Install lefthook git hooks (pre-commit + pre-push)
    cmds:
      - '{{.RUN}} hooks-install'

  hooks:uninstall:
    desc: Remove lefthook pre-commit hook
    cmds:
      - '{{.RUN}} hooks-uninstall'

  setup:
    desc: Install pinned toolchain (mise) and git hooks
    cmds:
      - mise install
      - task: hooks:install

  gha:ci:
    desc: Manually dispatch CI workflow (v* tag jobs on chosen ref)
    cmds:
      - gh workflow run ci.yml --ref {{.REF | default "master"}}

  gha:audit:
    desc: Manually dispatch security audit workflow
    cmds:
      - gh workflow run audit.yml --ref {{.REF | default "master"}}

  gha:benchmarks:
    desc: Manually dispatch benchmarks workflow
    cmds:
      - gh workflow run benchmarks.yml --ref {{.REF | default "master"}} -f warmups={{.WARMUPS | default "1"}} -f repeats={{.REPEATS | default "3"}}

  gha:python-release:
    desc: Manually dispatch Python wheel build (no PyPI publish)
    cmds:
      - gh workflow run python-release.yml --ref {{.REF | default "master"}}

  gha:crate-publish:
    desc: Manually dispatch crate publish dry-run (no crates.io publish)
    cmds:
      - gh workflow run crate-publish-dry-run.yml --ref {{.REF | default "master"}}

  gha:repo-metadata:
    desc: Manually dispatch GitHub About metadata sync
    cmds:
      - gh workflow run repo-metadata.yml --ref {{.REF | default "master"}}

  gha:fuzz:
    desc: Manually dispatch libFuzzer smoke workflow
    cmds:
      - gh workflow run fuzz-smoke.yml --ref {{.REF | default "master"}}
