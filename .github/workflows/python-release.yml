name: Build and Publish Python Wheels

# Trigger automatically only for release tags; use workflow_dispatch for manual builds.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate legal notices
        run: python scripts/ci/check_legal_compliance.py
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path python/Cargo.toml -i python3.10
          sccache: 'true'
          manylinux: auto
          before-script-linux: |
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install -y pkg-config libssl-dev
            elif command -v yum >/dev/null 2>&1; then
              yum install -y pkgconfig openssl-devel
            fi
        env:
          CFLAGS: "-std=gnu99"
          CFLAGS_aarch64_unknown_linux_gnu: "-std=gnu99"
      - name: Add third-party notices to wheels
        run: |
          for wheel in dist/*.whl; do
            python scripts/ci/package_wheel_notices.py "$wheel"
          done
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          architecture: ${{ matrix.target }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate legal notices
        run: python scripts/ci/check_legal_compliance.py
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path python/Cargo.toml
          sccache: 'true'
      - name: Add third-party notices to wheels
        run: Get-ChildItem dist/*.whl | ForEach-Object { python scripts/ci/package_wheel_notices.py $_.FullName }
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate legal notices
        run: python scripts/ci/check_legal_compliance.py
      - name: Set OpenBLAS target (Apple Silicon wheel)
        if: matrix.target == 'aarch64'
        run: echo "OPENBLAS_TARGET=ARMV8" >> "$GITHUB_ENV"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path python/Cargo.toml
          sccache: 'true'
      - name: Add third-party notices to wheels
        run: |
          for wheel in dist/*.whl; do
            python scripts/ci/package_wheel_notices.py "$wheel"
          done
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate legal notices
        run: python scripts/ci/check_legal_compliance.py
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [linux, windows, macos, sdist]
    runs-on: ubuntu-latest
    # Only publish to PyPI on tag pushes (e.g., git tag v0.1.0 && git push origin v0.1.0)
    if: "startsWith(github.ref, 'refs/tags/')"
    environment: pypi
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
      contents: write  # needed to create GitHub Release
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
