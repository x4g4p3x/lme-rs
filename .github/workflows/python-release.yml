name: Build and Publish Python Wheels

# CI calls this workflow after every release-tag validation job succeeds.
# workflow_dispatch remains available for non-publishing artifact builds.
on:
  workflow_call:
    inputs:
      publish:
        description: Publish the built artifacts for a validated release tag
        required: false
        type: boolean
        default: false
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.10'
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: Validate legal notices
        run: python scripts/ci/check_legal_compliance.py
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path python/Cargo.toml -i python3.10
          sccache: 'true'
          manylinux: auto
          before-script-linux: |
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install -y pkg-config libssl-dev
            elif command -v yum >/dev/null 2>&1; then
              yum install -y pkgconfig openssl-devel
            fi
        env:
          CFLAGS: "-std=gnu99"
          CFLAGS_aarch64_unknown_linux_gnu: "-std=gnu99"
      - name: Add third-party notices to wheels
        run: |
          for wheel in dist/*.whl; do
            python scripts/ci/package_wheel_notices.py "$wheel"
          done
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.10'
          architecture: ${{ matrix.target }}
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: Validate legal notices
        run: python scripts/ci/check_legal_compliance.py
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path python/Cargo.toml
          sccache: 'true'
      - name: Add third-party notices to wheels
        run: Get-ChildItem dist/*.whl | ForEach-Object { python scripts/ci/package_wheel_notices.py $_.FullName }
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.10'
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: Validate legal notices
        run: python scripts/ci/check_legal_compliance.py
      - name: Set OpenBLAS target (Apple Silicon wheel)
        if: matrix.target == 'aarch64'
        run: echo "OPENBLAS_TARGET=ARMV8" >> "$GITHUB_ENV"
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path python/Cargo.toml
          sccache: 'true'
      - name: Add third-party notices to wheels
        run: |
          for wheel in dist/*.whl; do
            python scripts/ci/package_wheel_notices.py "$wheel"
          done
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: Validate legal notices
        run: python scripts/ci/check_legal_compliance.py
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist --manifest-path python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [linux, windows, macos, sdist]
    runs-on: ubuntu-latest
    # Only CI's validated release-tag call can enable publication.
    if: "inputs.publish && startsWith(github.ref, 'refs/tags/v')"
    environment: pypi
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
      contents: write  # needed to create GitHub Release
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Normalize and verify wheel licenses
        run: |
          set -euo pipefail
          for wheel in dist/*.whl; do
            python scripts/ci/package_wheel_notices.py "$wheel"
          done

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: dist/*
