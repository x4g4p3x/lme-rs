# Weekly and manually dispatched libFuzzer smoke.
name: Fuzz smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "43 3 * * 0"

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  libfuzzer-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: fuzz

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz@0.13.2 --locked

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz

      - name: Build fuzz targets
        run: cargo fuzz build formula_parse && cargo fuzz build formula_pipeline

      - name: Run formula_parse
        run: cargo fuzz run formula_parse corpus/formula_parse -- -runs=15000 -max_len=16384

      - name: Run formula_pipeline
        run: cargo fuzz run formula_pipeline corpus/formula_parse -- -runs=15000 -max_len=16384
