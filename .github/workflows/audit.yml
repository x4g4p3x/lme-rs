name: Security audit

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.22.1

      - name: Run cargo audit (root)
        run: cargo audit

      - name: Run cargo audit (python/)
        working-directory: python
        run: cargo audit

  pip-audit:
    name: pip-audit (python lockfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements-ci.txt

      - name: Install locked CI dependencies
        working-directory: python
        run: |
          set -euo pipefail
          python -m pip install -U pip
          python -m pip install -r requirements-ci.txt

      - name: pip-audit
        working-directory: python
        run: python -m pip_audit
