name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenBLAS (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install openblas

      - name: Install OpenBLAS (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose --locked

      - name: Run tests
        run: cargo test --verbose --locked

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements-ci.txt

      - name: Python bindings (maturin develop, pytest, wheel install, pytest)
        working-directory: python
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          if [ -f .venv/Scripts/python.exe ]; then
            VPY=.venv/Scripts/python.exe
          else
            VPY=.venv/bin/python
          fi
          "$VPY" -m pip install -U pip
          "$VPY" -m pip install -r requirements-ci.txt
          "$VPY" -m maturin develop --release
          "$VPY" -m pytest tests/ -v
          "$VPY" -m maturin build --release -o dist
          shopt -s nullglob
          wheels=(dist/lme_python-*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "No wheel found under python/dist"
            ls -la dist 2>/dev/null || true
            exit 1
          fi
          "$VPY" -m pip install --force-reinstall "${wheels[0]}"
          "$VPY" -m pytest tests/ -v

  rust-all-targets:
    name: Rust check (all targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-
      - name: cargo check --workspace --all-targets
        run: cargo check --workspace --all-targets --locked -v

  rust-doctests:
    name: Rust doctests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-
      - name: cargo test --doc
        run: cargo test --doc --locked --verbose

  python-bindings-versions:
    name: Python ${{ matrix.python-version }} (ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/requirements-ci.txt
      - name: Python bindings (maturin develop, pytest, wheel install, pytest)
        working-directory: python
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          if [ -f .venv/Scripts/python.exe ]; then
            VPY=.venv/Scripts/python.exe
          else
            VPY=.venv/bin/python
          fi
          "$VPY" -m pip install -U pip
          "$VPY" -m pip install -r requirements-ci.txt
          "$VPY" -m maturin develop --release
          "$VPY" -m pytest tests/ -v
          "$VPY" -m maturin build --release -o dist
          shopt -s nullglob
          wheels=(dist/lme_python-*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "No wheel found under python/dist"
            ls -la dist 2>/dev/null || true
            exit 1
          fi
          "$VPY" -m pip install --force-reinstall "${wheels[0]}"
          "$VPY" -m pytest tests/ -v

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build documentation
        run: cargo doc --no-deps --verbose --locked
