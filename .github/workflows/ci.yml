name: CI

# Automatic runs: pull requests and v* release tags. Use workflow_dispatch for
# an intentional full check on any branch (Actions → CI → Run workflow).

on:
  pull_request:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  release-policy:
    name: Release policy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate legal notices and provenance
        run: python3 scripts/ci/lme_ci.py legal
      - name: Validate completion score claims
        run: python3 scripts/ci/lme_ci.py completion-check

  security-audit:
    name: Dependency security audit
    permissions:
      contents: read
    uses: ./.github/workflows/audit.yml

  rust-lint:
    name: Rust fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-lint-
      - name: rustfmt --check
        run: python3 scripts/ci/lme_ci.py fmt-check
      - name: clippy
        run: python3 scripts/ci/lme_ci.py clippy

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenBLAS (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set OpenBLAS target (macOS)
        if: matrix.os == 'macos-latest'
        run: echo "OPENBLAS_TARGET=ARMV8" >> "$GITHUB_ENV"

      - name: Run tests
        run: cargo test --verbose --locked

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "python/uv.lock"

      - name: Python bindings (editable identity + isolated wheel)
        run: python scripts/ci/lme_ci.py python --python-version 3.11

  rust-all-targets:
    name: Rust check (all targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-
      - name: cargo check --workspace --all-targets
        run: cargo check --workspace --all-targets --locked -v

  production-load:
    name: Production load & perf gates (ubuntu, release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenBLAS (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-prodload-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-prodload-

      - name: Production load tests (smoke + release wall-clock gates)
        run: cargo test --release --locked --verbose --test test_production_load

      - name: Heavy production load tests (ignored)
        if: github.event_name != 'pull_request'
        run: cargo test --release --locked --verbose --test test_production_load -- --ignored --test-threads=1

  rust-doctests:
    name: Rust doctests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-
      - name: cargo test --doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo test --doc --locked --verbose

  python-bindings-versions:
    name: Python ${{ matrix.python-version }} (ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "python/uv.lock"

      - name: Python bindings (editable identity + isolated wheel)
        run: python scripts/ci/lme_ci.py python --python-version ${{ matrix.python-version }}

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --verbose --locked

  publish-crate:
    name: Publish Rust crate after CI
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-policy
      - security-audit
      - rust-lint
      - test
      - rust-all-targets
      - production-load
      - rust-doctests
      - python-bindings-versions
      - docs
    permissions:
      contents: read
    uses: ./.github/workflows/crate-publish-dry-run.yml
    with:
      publish: true
    secrets: inherit

  publish-python:
    name: Publish Python artifacts after CI
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-policy
      - security-audit
      - rust-lint
      - test
      - rust-all-targets
      - production-load
      - rust-doctests
      - python-bindings-versions
      - docs
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/python-release.yml
    with:
      publish: true
