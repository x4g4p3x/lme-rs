name: CI

# Automatic runs: v* release tags only. Use workflow_dispatch for an intentional
# pre-release check on any branch (Actions → CI → Run workflow).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-lint:
    name: Rust fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-lint-
      - name: rustfmt --check
        run: python3 scripts/ci/lme_ci.py fmt-check
      - name: clippy
        run: python3 scripts/ci/lme_ci.py clippy

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenBLAS (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set OpenBLAS target (macOS)
        if: matrix.os == 'macos-latest'
        run: echo "OPENBLAS_TARGET=ARMV8" >> "$GITHUB_ENV"

      - name: Run tests
        run: cargo test --verbose --locked

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "python/uv.lock"

      - name: Python bindings (maturin develop, pytest, wheel install, pytest)
        working-directory: python
        shell: bash
        run: |
          set -euo pipefail
          uv sync --extra dev --no-install-project
          uv run maturin develop --release
          uv run pytest tests/ -v
          uv run maturin build --release -o dist
          shopt -s nullglob
          wheels=(dist/lme_python-*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "No wheel found under python/dist"
            ls -la dist 2>/dev/null || true
            exit 1
          fi
          uv run pip install --force-reinstall "${wheels[0]}"
          uv run pytest tests/ -v

  rust-all-targets:
    name: Rust check (all targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-
      - name: cargo check --workspace --all-targets
        run: cargo check --workspace --all-targets --locked -v

  production-load:
    name: Production load & perf gates (ubuntu, release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenBLAS (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-prodload-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-prodload-

      - name: Production load tests (smoke + release wall-clock gates)
        run: cargo test --release --locked --verbose --test test_production_load

      - name: Heavy production load tests (ignored)
        run: cargo test --release --locked --verbose --test test_production_load -- --ignored --test-threads=1

  rust-doctests:
    name: Rust doctests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-
      - name: cargo test --doc
        run: cargo test --doc --locked --verbose

  python-bindings-versions:
    name: Python ${{ matrix.python-version }} (ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "python/uv.lock"

      - name: Python bindings (maturin develop, pytest, wheel install, pytest)
        working-directory: python
        shell: bash
        run: |
          set -euo pipefail
          uv sync --extra dev --no-install-project
          uv run maturin develop --release
          uv run pytest tests/ -v
          uv run maturin build --release -o dist
          shopt -s nullglob
          wheels=(dist/lme_python-*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "No wheel found under python/dist"
            ls -la dist 2>/dev/null || true
            exit 1
          fi
          uv run pip install --force-reinstall "${wheels[0]}"
          uv run pytest tests/ -v

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build documentation
        run: cargo doc --no-deps --verbose --locked
